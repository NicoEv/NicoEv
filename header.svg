    <circle cx="40" cy="88" r="1.4"/><circle cx="100" cy="88" r="1.4"/><circle cx="160" cy="88" r="1.4"/><circle cx="220" cy="88" r="1.4"/><circle cx="280" cy="88" r="1.4"/><circle cx="340" cy="88" r="1.4"/><circle cx="400" cy="88" r="1.4"/><circle cx="460" cy="88" r="1.4"/><circle cx="520" cy="88" r="1.4"/><circle cx="580" cy="88" r="1.4"/><circle cx="640" cy="88" r="1.4"/><circle cx="700" cy="88" r="1.4"/><circle cx="760" cy="88" r="1.4"/><circle cx="820" cy="88" r="1.4"/>
    <circle cx="40" cy="148" r="1.4"/><circle cx="100" cy="148" r="1.4"/><circle cx="160" cy="148" r="1.4"/><circle cx="220" cy="148" r="1.4"/><circle cx="280" cy="148" r="1.4"/><circle cx="340" cy="148" r="1.4"/><circle cx="400" cy="148" r="1.4"/><circle cx="460" cy="148" r="1.4"/><circle cx="520" cy="148" r="1.4"/><circle cx="580" cy="148" r="1.4"/><circle cx="640" cy="148" r="1.4"/><circle cx="700" cy="148" r="1.4"/><circle cx="760" cy="148" r="1.4"/><circle cx="820" cy="148" r="1.4"/>
