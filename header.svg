  <polyline points="28,54 28,30 52,30" fill="none" stroke="#30a5c8" stroke-width="1.8" stroke-linecap="round" opacity="0.6"/>
  <polyline points="832,54 832,30 808,30" fill="none" stroke="#30a5c8" stroke-width="1.8" stroke-linecap="round" opacity="0.6"/>
  <polyline points="28,146 28,170 52,170" fill="none" stroke="#30a5c8" stroke-width="1.8" stroke-linecap="round" opacity="0.6"/>
